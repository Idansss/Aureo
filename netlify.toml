[build]
  # Base directory is the app folder
  base = "app"
  # Build command
  command = "npm run build"
  # Publish directory is handled automatically by @netlify/plugin-nextjs

[build.environment]
  # Node.js version
  NODE_VERSION = "20"

# Next.js plugin configuration
# This plugin automatically handles Next.js routing, API routes, and middleware
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Note: Cron jobs should be configured using external cron services
# or Netlify Scheduled Functions (see app/NETLIFY_DEPLOYMENT.md for details)

